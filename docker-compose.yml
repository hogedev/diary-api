services:
  api:
    build: .
    container_name: diary-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite+aiosqlite:///data/diary.db
      PHOTOS_DIR: data/photos
      TZ: Asia/Tokyo
    volumes:
      - diary-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  diary-data:
