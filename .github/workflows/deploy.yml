name: Deploy to GCE

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/ --ignore-missing-imports
      - run: uv run pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync + SSH
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete --exclude='.git' --exclude='.venv' --exclude='__pycache__' --exclude='data'
          path: ./
          remote_path: /opt/minilog/
          remote_host: ${{ secrets.GCE_HOST }}
          remote_user: ${{ secrets.GCE_USER }}
          remote_key: ${{ secrets.GCE_SSH_KEY }}

      - name: Rebuild and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            cd /opt/minilog
            sudo docker compose up -d --build --force-recreate
            sleep 10
            curl -sf http://localhost:8000/health
